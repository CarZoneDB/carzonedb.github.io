<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>CarZoneDB - Cars</title>
  <link rel="icon" type="image/x-icon" href="https://carzonedb.github.io/assets/favicon.png">
  <meta
    name="description"
    content="A fan-created database for the Roblox experience Car Zone, providing searchable and filterable information about cars, races, and other game content."
  />
  
  <link rel="stylesheet" href="../components/base.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="navbar"></div>
  
<main class="sect" aria-label="Filter and search cars">
 <!-- <center><p>🛈 RAP values may lack accuracy, as they do not get updated live anymore.</p></center> -->
  <div class="filter-bar">

    <input type="text" placeholder="Search cars..." class="filter-input">

    <!-- Type -->
    <div class="filter-dropdown">
      <button class="filter-btn" onclick="toggleDropdown(this)">All Types ▾</button>
      <div class="dropdown-menu">
        <div class="dropdown-header">Type</div>
        <label class="checkbox"><input type="checkbox" value="hyper">Hyper Car</label>
        <label class="checkbox"><input type="checkbox" value="limited">Limited</label>
        <label class="checkbox"><input type="checkbox" value="suv">SUV</label>
        <label class="checkbox"><input type="checkbox" value="sport">Sport</label>
        <label class="checkbox"><input type="checkbox" value="street">Street</label>
        <label class="checkbox"><input type="checkbox" value="super">Super Car</label>
      </div>
    </div>

    <!-- Shop Status -->
    <div class="filter-dropdown">
      <button class="filter-btn" onclick="toggleDropdown(this)">All Shop Status ▾</button>
      <div class="dropdown-menu">
        <div class="dropdown-header">Shop Status</div>
        <label class="checkbox"><input type="checkbox" value="available">In Shop</label>
        <label class="checkbox"><input type="checkbox" value="unavailable">Not in Shop</label>
      </div>
    </div>

<!-- Sort -->
<div class="filter-dropdown">
  <button class="filter-btn" onclick="toggleDropdown(this)">Sort By ▾</button>

  <div class="dropdown-menu">

    <div class="dropdown-header">Sort By</div>

    <label class="radio"><input type="radio" name="sort" value="none" checked>Default</label>

    <label class="radio"><input type="radio" name="sort" value="vmax-low">V-Max (Low → High)</label>
    <label class="radio"><input type="radio" name="sort" value="vmax-high">V-Max (High → Low)</label>

    <label class="radio"><input type="radio" name="sort" value="acc-low">Acceleration (Fastest)</label>
    <label class="radio"><input type="radio" name="sort" value="acc-high">Acceleration (Slowest)</label>

    <label class="radio"><input type="radio" name="sort" value="power-low">Horsepower (Low → High)</label>
    <label class="radio"><input type="radio" name="sort" value="power-high">Horsepower (High → Low)</label>

    <label class="radio"><input type="radio" name="sort" value="exp-low">Driving EXP (Low → High)</label>
    <label class="radio"><input type="radio" name="sort" value="exp-high">Driving EXP (High → Low)</label>

  </div>
</div>
    
    <!-- Chips -->
    <button class="filter-chip">Body Kits</button>
    <button class="filter-chip">New Cars</button>
    <button class="filter-chip">Gamepass Cars</button>

    <!-- Price -->
    <div class="filter-dropdown">
      <button class="filter-btn" onclick="toggleDropdown(this)">Price ▾</button>
      <div class="dropdown-menu">

        <div class="dropdown-header">Price</div>

<label class="radio">
  <input type="radio" name="price" value="any" checked>
  Any Price
</label>

<label class="radio">
  <input type="radio" name="price" value="low-high">
  Low → High
</label>

<label class="radio">
  <input type="radio" name="price" value="high-low">
  High → Low
</label>

<label class="radio">
  <input type="radio" name="price" value="range">
  <div class="range-inputs">
    <input type="number" id="minPrice" placeholder="Min">
    <input type="number" id="maxPrice" placeholder="Max">
  </div>
</label>

      </div>
    </div>

<!-- RAP -->

      <button class="filter-btn" onclick="toggleDropdown(this)">RAP ▾</button>
      <div class="dropdown-menu">
        <div class="dropdown-header">RAP</div>
        <label class="radio">
          <input type="radio" name="rap" value="any" checked>
          Any RAP
        </label>
        <label class="radio">
          <input type="radio" name="rap" value="low-high">
          Low → High
        </label>

          <input type="radio" name="rap" value="high-low">
          High → Low
        </label>
        <label class="radio">
          <input type="radio" name="rap" value="range">
          <div class="range-inputs">
            <input type="number" id="minRap" placeholder="Min">
            <input type="number" id="maxRap" placeholder="Max">
          </div>
        </label>
      </div>
    </div>-->
    
  </div>

<div id="carList">
  <div class="card-container" id="card-container"></div>
</div>
</main>

  <div id="footer"></div>

  <script src="../components/elementloader.js"></script>
  <script type="module" src="script.js"></script>
  
</body>
</html>
