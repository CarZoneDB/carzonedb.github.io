    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>CarZoneDB - Cars</title>
  <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/CarZoneDB/CarZoneDB.github.io/refs/heads/main/assets/favicon.png">
  
  <meta name="description" content="A fan-created database for the Roblox experience Car Zone, providing searchable and filterable information about cars, races, and other game content." />
  
  <link rel="stylesheet" href="../components/base.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="navbar"></div>

<main class="sect" aria-label="Filter and search cars">

  <!-- FILTER BAR -->
  <div class="filter-bar">

    <!-- SEARCH -->
    <input type="text" placeholder="Search cars..." class="filter-input">

    <!-- TYPE -->
    <div class="filter-dropdown">
      <button class="filter-btn" onclick="toggleDropdown(this)">All Types ▾</button>
      <div class="dropdown-menu">
        <div class="dropdown-header">Type</div>
        <label class="checkbox"><input type="checkbox" value="hyper">Hyper Car</label>
        <label class="checkbox"><input type="checkbox" value="limited">Limited</label>
        <label class="checkbox"><input type="checkbox" value="suv">SUV</label>
        <label class="checkbox"><input type="checkbox" value="sport">Sport</label>
        <label class="checkbox"><input type="checkbox" value="street">Street</label>
        <label class="checkbox"><input type="checkbox" value="super">Super Car</label>
      </div>
    </div>

    <!-- SHOP STATUS -->
    <div class="filter-dropdown">
      <button class="filter-btn" onclick="toggleDropdown(this)">Shop Status ▾</button>
      <div class="dropdown-menu">
        <div class="dropdown-header">Shop Status</div>
        <label class="checkbox"><input type="checkbox" value="available">In Shop</label>
        <label class="checkbox"><input type="checkbox" value="unavailable">Not in Shop</label>
      </div>
    </div>

    <!-- CHIPS -->
    <button class="filter-chip">Body Kits</button>
    <button class="filter-chip">New Cars</button>
    <button class="filter-chip">Gamepass Cars</button>

    <!-- PRICE -->
    <div class="filter-dropdown">
      <button class="filter-btn" onclick="toggleDropdown(this)">Price ▾</button>
      <div class="dropdown-menu">
        <div class="dropdown-header">Price</div>

        <label class="radio"><input type="radio" name="price" value="any" checked>Any Price</label>
        <label class="radio"><input type="radio" name="price" value="low-high">Low → High</label>
        <label class="radio"><input type="radio" name="price" value="high-low">High → Low</label>

        <label class="radio">
          <input type="radio" name="price" value="range">
          <div class="range-inputs">
            <input type="number" id="minPrice" placeholder="Min">
            <input type="number" id="maxPrice" placeholder="Max">
          </div>
        </label>
      </div>
    </div>

    <!-- RAP -->
    <div class="filter-dropdown">
      <button class="filter-btn" onclick="toggleDropdown(this)">RAP ▾</button>
      <div class="dropdown-menu">
        <div class="dropdown-header">RAP</div>

        <label class="radio"><input type="radio" name="rap" value="any" checked>Any RAP</label>
        <label class="radio"><input type="radio" name="rap" value="low-high">Low → High</label>
        <label class="radio"><input type="radio" name="rap" value="high-low">High → Low</label>

        <label class="radio">
          <input type="radio" name="rap" value="range">
          <div class="range-inputs">
            <input type="number" id="minRap" placeholder="Min">
            <input type="number" id="maxRap" placeholder="Max">
          </div>
        </label>
      </div>
    </div>

    <!-- VMAX -->
    <div class="filter-dropdown">
      <button class="filter-btn" onclick="toggleDropdown(this)">V-Max ▾</button>
      <div class="dropdown-menu">
        <div class="dropdown-header">V-Max (MPH)</div>

        <label class="radio"><input type="radio" name="vmax" value="any" checked>Any</label>
        <label class="radio"><input type="radio" name="vmax" value="low-high">Low → High</label>
        <label class="radio"><input type="radio" name="vmax" value="high-low">High → Low</label>

        <label class="radio">
          <input type="radio" name="vmax" value="range">
          <div class="range-inputs">
            <input type="number" id="minVmax" placeholder="Min">
            <input type="number" id="maxVmax" placeholder="Max">
          </div>
        </label>
      </div>
    </div>

    <!-- HORSEPOWER -->
    <div class="filter-dropdown">
      <button class="filter-btn" onclick="toggleDropdown(this)">Horsepower ▾</button>
      <div class="dropdown-menu">
        <div class="dropdown-header">HP</div>

        <label class="radio"><input type="radio" name="power" value="any" checked>Any</label>
        <label class="radio"><input type="radio" name="power" value="low-high">Low → High</label>
        <label class="radio"><input type="radio" name="power" value="high-low">High → Low</label>

        <label class="radio">
          <input type="radio" name="power" value="range">
          <div class="range-inputs">
            <input type="number" id="minPower" placeholder="Min">
            <input type="number" id="maxPower" placeholder="Max">
          </div>
        </label>
      </div>
    </div>

    <!-- ACCELERATION -->
    <div class="filter-dropdown">
      <button class="filter-btn" onclick="toggleDropdown(this)">Acceleration ▾</button>
      <div class="dropdown-menu">
        <div class="dropdown-header">0–60</div>

        <label class="radio"><input type="radio" name="acc" value="any" checked>Any</label>
        <label class="radio"><input type="radio" name="acc" value="low-high">Slow → Fast</label>
        <label class="radio"><input type="radio" name="acc" value="high-low">Fast → Slow</label>

        <label class="radio">
          <input type="radio" name="acc" value="range">
          <div class="range-inputs">
            <input type="number" id="minAcc" placeholder="Min" step="0.1">
            <input type="number" id="maxAcc" placeholder="Max" step="0.1">
          </div>
        </label>
      </div>
    </div>

    <!-- EXP -->
    <div class="filter-dropdown">
      <button class="filter-btn" onclick="toggleDropdown(this)">EXP ▾</button>
      <div class="dropdown-menu">
        <div class="dropdown-header">EXP</div>

        <label class="radio"><input type="radio" name="exp" value="any" checked>Any</label>
        <label class="radio"><input type="radio" name="exp" value="low-high">Low → High</label>
        <label class="radio"><input type="radio" name="exp" value="high-low">High → Low</label>

        <label class="radio">
          <input type="radio" name="exp" value="range">
          <div class="range-inputs">
            <input type="number" id="minExp" placeholder="Min">
            <input type="number" id="maxExp" placeholder="Max">
          </div>
        </label>
      </div>
    </div>

  </div>

  <!-- CAR LIST -->
  <div id="carList">
    <div class="card-container" id="card-container"></div>
  </div>

</main>

<div id="footer"></div>

<script src="../components/elementloader.js"></script>
<script src="script.js"></script>

</body>
</html>

        <div class="dropdown-header">RAP</div>

</main>
