<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
}

body {
    background: var(--background-color);
    color: var(--text-color);
    font-family: var(--font-family);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding-top: 64px;
}

/* ================= RETIREMENT NOTICE ================= */
.notice-banner {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;

    padding: 10px 48px 10px 16px;
    box-sizing: border-box;

    background: #FFD54A;
    color: #222;

    font-size: 14px;
    font-weight: 600;
    text-align: center;

    z-index: 400;
}

.notice-banner .close {
    position: absolute;
    top: 50%;
    right: 16px;
    transform: translateY(-50%);

    background: none;
    border: none;

    font-size: 22px;
    font-weight: bold;
    line-height: 1;

    cursor: pointer;
    color: inherit;
}
    
/* ================= NAVBAR ================= */
.navbar {
    position: fixed;
    /*top: 0;*/
    left: 0;
    width: 100%;
    height: 64px;
    z-index: 300;

    background: var(--foreground-color);
    border-bottom: 1px solid var(--border-color);

    display: flex;
    align-items: center;

    padding: 0 16px;
    box-sizing: border-box;
}

/* ================= LOGO ================= */
.nav-header {
    display: flex;
    align-items: center;
}

.logo {
    height: 42px;
    width: auto;
    display: block;
}

/* ================= HAMBURGER ================= */
.nav-toggle {
    margin-left: auto;

    display: none;
    font-size: 28px;

    background: none;
    border: none;
    color: var(--text-color);

    cursor: pointer;
}

/* ================= LINKS ================= */
.nav-links {
    list-style: none;

    display: flex;
    align-items: center;
    gap: 24px;

    margin: 0 0 0 24px;
    padding: 0;
}

.navbar li {
    display: flex;
    align-items: center;
}

.navbar a {
    display: block;

    padding: 10px 20px;
    border-radius: 12px;

    color: var(--text-color);
    text-decoration: none;

    transition: 0.2s ease;
    white-space: nowrap;
}

.navbar a:hover {
    background: var(--border-color);
    transform: scale(1.03);
}

.navbar a.active {
    font-weight: bold;
}

/* ================= MOBILE ================= */
@media (max-width: 600px) {

    .nav-toggle {
        display: block;
    }

    .nav-links {
        display: none;

        position: absolute;
        top: 64px;
        left: 0;
        width: 100%;

        flex-direction: column;
        gap: 10px;

        background: var(--foreground-color);
        padding: 10px 0;
        margin: 0;

        border-bottom: 1px solid var(--border-color);
    }

    .navbar.open .nav-links {
        display: flex;
    }

    .navbar a {
        width: 100%;
        text-align: center;
        box-sizing: border-box;
    }
}
</style>

<nav class="navbar">
    <div class="nav-header">
        <img class="logo" src="https://carzonedb.github.io/assets/favicon.png" alt="Logo">
    </div>

    <button class="nav-toggle">☰</button>

    <ul class="nav-links">
        <li><a href="https://carzonedb.github.io/">Home</a></li>
        <li><a href="https://carzonedb.github.io/cars/">Cars</a></li>
        <li><a href="https://carzonedb.github.io/races/">Races</a></li>
        <li><a href="https://carzonedb.github.io/calculator/">Calculator</a></li>
        <li><a href="https://discord.gg/9r4Hdkr2NA">Discord</a></li>
    </ul>
</nav>

<script>
const navbar = document.querySelector(".navbar");
const toggle = document.querySelector(".nav-toggle");
const notice = document.getElementById("notice");
const closeNotice = document.getElementById("closeNotice");

toggle.addEventListener("click", () => {
    navbar.classList.toggle("open");
});

function updateLayout() {
    if (notice.style.display === "none") {
        navbar.style.top = "0";
        document.body.style.paddingTop = "64px";
    } else {
        const h = notice.offsetHeight;
        navbar.style.top = h + "px";
        document.body.style.paddingTop = (h + 64) + "px";
    }
}

updateLayout();
window.addEventListener("resize", updateLayout);

closeNotice.addEventListener("click", () => {
    notice.style.display = "none";
    updateLayout();
});
</script>
