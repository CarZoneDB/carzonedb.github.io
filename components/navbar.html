<style>

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
}

body {
    background: var(--background-color);
    color: var(--text-color);
    font-family: var(--font-family);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding-top: 64px;
}

/* ===== NAVBAR ===== */
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 300;

    background: var(--foreground-color);
    border-bottom: 1px solid var(--border-color);
}

.navbar .nav-links {
    list-style: none;

    display: flex;
    align-items: center;
    gap: 24px;

    margin: 0;
    padding: 0 24px;

    min-height: 64px;
    box-sizing: border-box;
}

.navbar li {
    display: flex;
    align-items: center;
    flex: 0 0 auto;
}

/* ===== LOGO ===== */
.navbar .logo {
    display: flex;
    align-items: center;

    padding: 0;
    margin: 0;
}

.navbar .logo img {
    height: 42px;
    width: auto;
    display: block;
}

/* ===== LINKS ===== */
.navbar a {
    display: block;

    padding: 10px 20px;
    border-radius: 12px;

    color: var(--text-color);
    text-decoration: none;

    transition: 0.2s ease;
    white-space: nowrap;
}

.navbar a:hover {
    background: var(--border-color);
    transform: scale(1.03);
}

.navbar a.active {
    font-weight: bold;
}

.nav-toggle {
    display: none;
    position: absolute;
    right: 16px;
    top: 14px;

    font-size: 28px;
    background: none;
    border: none;
    color: var(--text-color);
    cursor: pointer;
}

/* ===== MOBILE ===== */
@media (max-width: 600px) {

    .nav-toggle {
        display: block;
    }

    .navbar .nav-links {
        display: none;
        flex-direction: column;
        align-items: stretch;

        gap: 10px;

        padding: 10px;
    }

    .navbar.open .nav-links {
        display: flex;
    }

    .navbar li {
        width: 100%;
    }

    .navbar .logo,
    .navbar a {
        width: 100%;
        box-sizing: border-box;
        text-align: center;
    }

    body {
        padding-top: 64px;
    }
}

</style>

<nav class="navbar">
    <button class="nav-toggle" aria-label="Toggle navigation">☰</button>

    <ul class="nav-links">
        <li class="logo">
            <img src="https://carzonedb.github.io/assets/favicon.png" alt="CarZoneDB Logo">
        </li>
        <li><a href="https://carzonedb.github.io/">Home</a></li>
        <li><a href="https://carzonedb.github.io/cars/">Cars</a></li>
        <li><a href="https://carzonedb.github.io/races/">Races</a></li>
        <li><a href="https://carzonedb.github.io/calculator/">Calculator</a></li>
        <li><a href="https://discord.gg/9r4Hdkr2NA">Discord</a></li>
    </ul>
</nav>

<script>
    const navbar = document.querySelector(".navbar");
    const toggle = document.querySelector(".nav-toggle");

    toggle.addEventListener("click", () => {
        navbar.classList.toggle("open");
    });
</script>
