<style>

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
}

body {
    background: var(--background-color);
    color: var(--text-color);
    font-family: var(--font-family);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* ===== NAVBAR ===== */
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;

    z-index: 300;

    background: var(--foreground-color);
    border-bottom: 1px solid var(--border-color);
}

.navbar ul {
    list-style: none;

    display: flex;
    align-items: center;
    gap: 24px;

    margin: 0;
    padding: 0 24px;

    min-height: 64px;
    box-sizing: border-box;
}

.navbar li {
    flex: 0 0 auto;
}

.navbar .logo {
    font-weight: 600;
    font-size: 18px;

    padding: 8px 18px;
    border-radius: 12px;

    background: var(--accent-color);
    color: var(--text-color);

    user-select: none;
    white-space: nowrap;
}

.navbar a {
    display: block;

    padding: 10px 20px;
    border-radius: 12px;

    color: var(--text-color);
    text-decoration: none;

    transition: 0.2s ease;
    white-space: nowrap;
}

.navbar a:hover {
    background: var(--border-color);
    transform: scale(1.03);
}

.navbar a.active {
    font-weight: bold;
}

body {
    padding-top: 64px;
}

/* ===== MOBILE ===== */
@media (max-width: 600px) {
    .navbar ul {
        flex-direction: column;
        align-items: stretch;

        gap: 10px;

        padding: 10px;
        min-height: unset;
    }

    .navbar li {
        width: 100%;
    }

    .navbar .logo,
    .navbar a {
        width: 100%;
        box-sizing: border-box;
        text-align: center;
    }

    body {
        padding-top: 220px;
    }
}
</style>

<nav class="navbar">
    <ul>
        <li class="logo">CarZoneDB</li>
        <li><a href="https://carzonedb.github.io/">Home</a></li>
        <li><a href="https://carzonedb.github.io/cars/">Cars</a></li>
        <li><a href="https://carzonedb.github.io/races/">Races</a></li>
        <li><a href="https://carzonedb.github.io/calculator/">Calculator</a></li>
        <li><a href="https://discord.gg/9r4Hdkr2NA">Discord</a></li>
    </ul>
</nav>
